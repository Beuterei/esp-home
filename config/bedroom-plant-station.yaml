---
substitutions:
  device_name: bedroom-plant-station
  friendly_name: Bedroom Plant Station
  project_version: 1.0.0
  device_description: A plant watering station for the bedroom

esphome:
  name: ${device_name}
  comment: ${device_description}
  project:
    name: beuluis.${device_name}
    version: ${project_version}

esp32:
  board: nodemcu-32s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: ${device_name}
    password: !secret fallback_ap_password

captive_portal:

logger:

api:
  encryption:
    key: !secret api_key

ota:
  platform: esphome
  password: !secret ota_password

web_server:
  port: 80
  auth:
    username: esphome
    password: !secret web_password

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO27
      mode: INPUT_PULLUP
      inverted: true
    name: "${friendly_name} Water Tank Empty"
    device_class: problem

output:
  - platform: gpio
    pin: GPIO32
    id: pump_relay

# Add number component for configurable watering duration
number:
  - platform: template
    name: "${friendly_name} Watering Duration"
    id: watering_duration_seconds
    optimistic: true
    min_value: 1
    max_value: 60
    step: 1
    unit_of_measurement: "s"
    icon: "mdi:timer"
    initial_value: 20
    restore_value: true
    mode: slider

button:
  - platform: template
    name: "${friendly_name} Water Plants"
    on_press:
      - output.turn_on: pump_relay
      - delay: !lambda "return watering_duration_seconds->state * 1000;"
      - output.turn_off: pump_relay