---
substitutions:
  device_name: bluetooth-proxy
  friendly_name: Bluetooth proxy
  project_version: 1.0.0
  device_description: Proxies nerby bluetooth devices to HO

esphome:
  name: ${device_name}
  comment: ${device_description}
  project:
    name: beuluis.${device_name}
    version: ${project_version}

esp32:
  board: nodemcu-32s
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: ${device_name}
    password: !secret fallback_ap_password

captive_portal:

logger:

api:
  encryption:
    key: !secret api_key

ota:
  platform: esphome
  password: !secret ota_password

bluetooth_proxy:
  active: true
