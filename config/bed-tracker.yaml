---
substitutions:
  device_name: bed-tracker
  friendly_name: Bed Tracker
  project_version: 1.0.0
  device_description: Bed occupancy sensor

esphome:
  name: ${device_name}
  comment: ${device_description}
  project:
    name: beuluis.${device_name}
    version: ${project_version}

esp32:
  variant: esp32c6
  board: esp32-c6-devkitc-1
  flash_size: 4MB
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: ${device_name}
    password: !secret fallback_ap_password

captive_portal:

logger:

api:
  encryption:
    key: !secret api_key

ota:
  platform: esphome
  password: !secret ota_password

web_server:
  port: 80
  auth:
    username: esphome
    password: !secret web_password

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO4
      mode: INPUT_PULLUP
      inverted: true
    name: ${friendly_name} Occupied
    device_class: occupancy
